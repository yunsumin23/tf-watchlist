<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE FINALS — WATCHLIST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#050709;--bg1:#090d12;--bg2:#0e1520;--bg3:#131d2a;
  --border:#1a2535;--border-bright:#263545;
  --accent:#00e5a0;--accent-dim:#00664a;--accent-glow:rgba(0,229,160,0.18);
  --amber:#ffaa22;--danger:#ff3b3b;--danger-glow:rgba(255,59,59,0.15);
  --blue:#4aa8ff;--purple:#b388ff;
  --text:#8facc4;--text-mid:#b8cfe0;--text-bright:#e8f2fa;
  --mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;
  /* League colors */
  --bronze:#cd7f32;--silver:#c0c0c0;--gold:#ffd700;
  --plat:#00e5a0;--diamond:#4aa8ff;--ruby:#ff3b3b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999;}

/* ── HEADER ── */
#header{background:linear-gradient(180deg,#0c1520 0%,var(--bg1) 100%);border-bottom:1px solid var(--border-bright);padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
#logo{font-family:var(--mono);font-size:17px;color:var(--accent);letter-spacing:2px;text-shadow:0 0 12px var(--accent);white-space:nowrap;flex-shrink:0;}
#logo span{color:var(--text);opacity:0.5;}
#header-stats{font-family:var(--mono);font-size:11px;color:var(--text);display:flex;gap:16px;flex-shrink:0;}
#header-stats .hs-item{display:flex;flex-direction:column;gap:1px;}
#header-stats .hs-label{opacity:0.4;font-size:9px;letter-spacing:1px;}
#header-stats .hs-val{color:var(--text-mid);}
#header-stats .hs-val.green{color:var(--accent);}
#header-stats .hs-val.amber{color:var(--amber);}
#header-stats .hs-val.danger{color:var(--danger);}
#header-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn{background:var(--bg2);border:1px solid var(--border-bright);color:var(--text-mid);font-family:var(--sans);font-size:13px;font-weight:600;padding:5px 12px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn:hover{background:var(--bg3);color:var(--text-bright);border-color:var(--accent-dim);}
.btn.primary{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.btn.primary:hover{background:#008f5e;color:#fff;}
.btn.danger{background:var(--danger-dim);border-color:var(--danger);color:var(--danger);}
.btn.amber{background:#3d2a00;border-color:var(--amber);color:var(--amber);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.toggle-btn{background:var(--bg2);border:1px solid var(--border-bright);color:var(--text);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.toggle-btn.on{background:#003d28;border-color:var(--accent);color:var(--accent);}
.toggle-dot{width:8px;height:8px;border-radius:50%;background:var(--border-bright);transition:background .15s;}
.toggle-btn.on .toggle-dot{background:var(--accent);}

/* ── CONTROLS BAR ── */
#controls{background:var(--bg1);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#last-poll-time{font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.5;margin-left:4px;}
#poll-countdown{font-family:var(--mono);font-size:11px;color:var(--amber);min-width:36px;}
#poll-countdown.paused{color:var(--text);opacity:0.4;}
select{background:var(--bg2);border:1px solid var(--border-bright);color:var(--text-mid);font-family:var(--sans);font-size:13px;padding:4px 8px;border-radius:4px;cursor:pointer;}
select:focus{outline:none;border-color:var(--accent-dim);}
#events-status{font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.5;margin-left:auto;}

/* ── GITHUB BAR ── */
#gh-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;}
#gh-bar input{background:var(--bg0);border:1px solid var(--border);color:var(--text-mid);font-family:var(--mono);font-size:11px;padding:4px 8px;border-radius:3px;width:140px;}
#gh-bar input:focus{outline:none;border-color:var(--accent-dim);}
#gh-bar input[type=password]{width:200px;}
#gh-info{color:var(--text);opacity:0.4;font-size:10px;margin-left:4px;}

/* ── FILTER BAR ── */
#filter-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;padding:4px 12px;border-radius:3px;cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--border-bright);color:var(--text-mid);}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
#search-input{background:var(--bg2);border:1px solid var(--border-bright);color:var(--text-mid);font-family:var(--mono);font-size:12px;padding:5px 10px;border-radius:4px;width:180px;}
#search-input:focus{outline:none;border-color:var(--accent-dim);}
#sort-select{margin-left:auto;}

/* ── GRID ── */
#grid-container{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
#empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text);opacity:0.4;}
#empty-state .empty-icon{font-size:48px;margin-bottom:16px;}
#empty-state .empty-text{font-size:18px;font-weight:600;}

/* ── CARD ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer;position:relative;}
.card:hover{border-color:var(--border-bright);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.card.status-confirmed{border-left:3px solid var(--danger);}
.card.status-suspicious{border-left:3px solid var(--amber);}
.card.status-watching{border-left:3px solid var(--blue);}
.card.just-active{animation:pulse-card .8s ease;}
@keyframes pulse-card{0%,100%{box-shadow:none;}50%{box-shadow:0 0 20px var(--accent-glow),0 0 40px var(--accent-glow);}}

.card-top{padding:10px 12px 8px;display:flex;align-items:flex-start;gap:10px;}
.card-avatar{width:44px;height:44px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;position:relative;}
.card-avatar img{width:100%;height:100%;object-fit:cover;}
.card-avatar-initials{font-family:var(--mono);font-size:14px;color:var(--text);font-weight:700;}
.league-badge{position:absolute;bottom:-3px;right:-3px;font-size:9px;font-family:var(--mono);font-weight:700;padding:1px 4px;border-radius:2px;line-height:1.4;}

.card-info{flex:1;min-width:0;}
.card-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-tag{font-family:var(--mono);font-size:13px;color:var(--text-bright);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-alias{font-size:11px;color:var(--text);opacity:0.6;white-space:nowrap;}
.club-tag{font-family:var(--mono);font-size:10px;color:var(--amber);background:rgba(255,170,34,0.1);border:1px solid rgba(255,170,34,0.3);padding:1px 5px;border-radius:2px;flex-shrink:0;}
.status-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.status-badge{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:2px;font-weight:700;letter-spacing:0.5px;}
.badge-confirmed{background:var(--danger-dim);color:var(--danger);border:1px solid var(--danger);}
.badge-suspicious{background:#3d2a00;color:var(--amber);border:1px solid var(--amber);}
.badge-watching{background:#00233d;color:var(--blue);border:1px solid var(--blue);}
.badge-notfound{background:#1a0a0a;color:#ff6666;border:1px solid #ff3333;}

.card-actions{display:flex;gap:4px;flex-shrink:0;}
.icon-btn{background:transparent;border:none;color:var(--text);cursor:pointer;padding:4px;border-radius:3px;font-size:12px;opacity:0.5;transition:opacity .15s,color .15s;}
.icon-btn:hover{opacity:1;color:var(--text-bright);}

/* platform names */
.platform-row{padding:0 12px 6px;display:flex;gap:8px;flex-wrap:wrap;}
.platform-item{font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.6;display:flex;align-items:center;gap:3px;}
.platform-item .picon{font-size:11px;}

/* score row */
.card-stats{padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid var(--border);}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--text);opacity:0.4;letter-spacing:1px;}
.stat-val{font-family:var(--mono);font-size:16px;color:var(--text-bright);font-weight:700;letter-spacing:-0.5px;}
.stat-val.big{font-size:20px;}
.stat-delta{font-family:var(--mono);font-size:11px;}
.stat-delta.pos{color:var(--accent);}
.stat-delta.neg{color:var(--danger);}
.stat-delta.neu{color:var(--text);opacity:0.4;}
.rank-change{font-size:10px;font-family:var(--mono);}
.rank-change.up{color:var(--accent);}
.rank-change.down{color:var(--danger);}

/* sparkline */
.card-chart{padding:4px 12px 2px;height:36px;}
.sparkline{width:100%;height:100%;}

/* activity */
.card-activity{padding:6px 12px 8px;font-family:var(--mono);font-size:11px;display:flex;justify-content:space-between;align-items:center;}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--border-bright);display:inline-block;margin-right:5px;}
.activity-dot.recent{background:var(--accent);box-shadow:0 0 6px var(--accent);}
.activity-dot.today{background:var(--amber);}
.active-time{color:var(--accent);}
.today-time{color:var(--amber);}
.card-notes-preview{font-size:10px;color:var(--text);opacity:0.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}

/* card bottom */
.card-bottom{border-top:1px solid var(--border);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;}
.card-links{display:flex;gap:8px;}
.card-link{font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.5;text-decoration:none;display:flex;align-items:center;gap:3px;transition:opacity .15s,color .15s;}
.card-link:hover{opacity:1;color:var(--accent);}

/* CHECKING RING */
.checking-ring{display:inline-block;width:10px;height:10px;border:2px solid var(--accent-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg1);border:1px solid var(--border-bright);border-radius:8px;width:460px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-family:var(--mono);font-size:14px;color:var(--text-bright);letter-spacing:1px;}
.modal-close{background:none;border:none;color:var(--text);cursor:pointer;font-size:16px;opacity:0.5;transition:opacity .15s;}
.modal-close:hover{opacity:1;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.6;letter-spacing:1px;}
.form-input{background:var(--bg0);border:1px solid var(--border-bright);color:var(--text-bright);font-family:var(--mono);font-size:13px;padding:8px 10px;border-radius:4px;width:100%;}
.form-input:focus{outline:none;border-color:var(--accent-dim);}
.form-hint{font-family:var(--mono);font-size:10px;color:var(--text);opacity:0.4;line-height:1.6;}
textarea.form-input{resize:vertical;min-height:60px;}
.status-opts{display:flex;gap:8px;}
.status-opt{flex:1;padding:8px;border:1px solid var(--border-bright);border-radius:4px;cursor:pointer;text-align:center;font-size:12px;font-weight:700;font-family:var(--mono);transition:all .15s;}
.status-opt.confirmed{color:var(--danger);}
.status-opt.suspicious{color:var(--amber);}
.status-opt.watching{color:var(--blue);}
.status-opt.selected.confirmed{background:var(--danger-dim);border-color:var(--danger);}
.status-opt.selected.suspicious{background:#3d2a00;border-color:var(--amber);}
.status-opt.selected.watching{background:#00233d;border-color:var(--blue);}
.avatar-row{display:flex;align-items:center;gap:12px;}
#avatar-preview{width:52px;height:52px;border-radius:4px;background:var(--bg0);border:1px solid var(--border-bright);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
#avatar-preview img{width:100%;height:100%;object-fit:cover;}
.avatar-inputs{flex:1;display:flex;flex-direction:column;gap:6px;}

/* ── HISTORY MODAL ── */
#history-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
.hist-modal{background:var(--bg1);border:1px solid var(--border-bright);border-radius:8px;width:540px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;}
.hist-row{display:grid;grid-template-columns:140px 70px 80px 80px;gap:8px;padding:8px 16px;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border);align-items:center;}
.hist-row:last-child{border-bottom:none;}
.hist-row.header{font-size:10px;color:var(--text);opacity:0.4;background:var(--bg2);}
.hist-time{color:var(--text);}
.hist-rank{color:var(--text-mid);}
.hist-score{color:var(--text-bright);font-weight:700;}
.hist-delta.pos{color:var(--accent);}
.hist-delta.neg{color:var(--danger);}
.hist-loading{padding:40px;text-align:center;font-family:var(--mono);color:var(--text);opacity:0.5;}
.event-row{padding:8px 16px;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.event-type{padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700;}
.event-name{color:#b388ff;background:rgba(179,136,255,0.1);border:1px solid rgba(179,136,255,0.3);}
.event-club{color:var(--amber);background:rgba(255,170,34,0.1);border:1px solid rgba(255,170,34,0.3);}
.event-ban{color:var(--danger);background:var(--danger-dim);border:1px solid var(--danger);}
.event-rs{color:var(--blue);background:rgba(74,168,255,0.1);border:1px solid rgba(74,168,255,0.3);}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9000;}
.toast{background:var(--bg2);border:1px solid var(--border-bright);color:var(--text-mid);font-family:var(--mono);font-size:12px;padding:10px 16px;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,0.4);animation:slideIn .2s ease;max-width:320px;}
.toast.success{border-color:var(--accent);color:var(--accent);}
.toast.warn{border-color:var(--amber);color:var(--amber);}
.toast.error{border-color:var(--danger);color:var(--danger);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0;}to{transform:none;opacity:1;}}

/* ── NOTIF BANNER ── */
#notif-banner{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:12px;padding:10px 20px;border-radius:4px;z-index:500;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
#notif-banner.show{opacity:1;}

/* ── IO MODAL ── */
#io-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;}
#io-modal-overlay.open{display:flex;}
#io-modal-overlay .modal{width:520px;}
#io-modal-overlay textarea{background:var(--bg0);border:1px solid var(--border-bright);color:var(--text-mid);font-family:var(--mono);font-size:11px;padding:10px;border-radius:4px;width:100%;height:200px;resize:vertical;}

/* ── EVENTS FEED ── */
#events-feed{display:none;position:fixed;right:20px;bottom:70px;width:340px;max-height:400px;background:var(--bg1);border:1px solid var(--border-bright);border-radius:6px;z-index:200;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
#events-feed.show{display:block;}
#events-feed-header{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg1);}
#events-feed-title{font-family:var(--mono);font-size:11px;color:var(--text-bright);}
.feed-event-row{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;}
.feed-event-row.tracked{background:rgba(0,229,160,0.05);border-left:2px solid var(--accent);}
.feed-event-time{color:var(--text);opacity:0.4;}
.feed-event-player{color:var(--text-bright);font-weight:700;}
.feed-event-desc{color:var(--text);}

/* ── IO MODAL ── */
#io-modal .form-hint{margin-bottom:8px;}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">THE FINALS <span>//</span> WATCHLIST</div>
  <div id="header-stats">
    <div class="hs-item"><div class="hs-label">PLAYERS</div><div class="hs-val" id="stat-total">0</div></div>
    <div class="hs-item"><div class="hs-label">확정핵</div><div class="hs-val danger" id="stat-confirmed">0</div></div>
    <div class="hs-item"><div class="hs-label">의심</div><div class="hs-val amber" id="stat-suspicious">0</div></div>
    <div class="hs-item"><div class="hs-label">오늘활동</div><div class="hs-val green" id="stat-today">0</div></div>
  </div>
  <div id="header-right">
    <button class="toggle-btn" id="notif-toggle" onclick="toggleNotifications()"><span class="toggle-dot"></span> 알림</button>
    <button class="btn" onclick="openIO('export')">↑ 내보내기</button>
    <button class="btn" onclick="openIO('import')">↓ 불러오기</button>
    <button class="btn primary" onclick="openAddModal()">＋ 플레이어 추가</button>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="btn primary" id="refresh-btn" onclick="refreshAll()">
    <svg viewBox="0 0 16 16" style="width:13px;height:13px;fill:currentColor"><path d="M13.7 2.3A7.5 7.5 0 1 0 15 8h-1.5a6 6 0 1 1-1.1-3.5L10 6.5h4.5V2z"/></svg>
    전체 조회
  </button>
  <span id="last-poll-time">—</span>
  <span style="font-family:var(--mono);font-size:11px;color:var(--text);opacity:0.4;">자동:</span>
  <select id="interval-select" onchange="resetPoll()">
    <option value="0">수동</option>
    <option value="1" selected>1분</option>
    <option value="2">2분</option>
    <option value="3">3분</option>
    <option value="5">5분</option>
    <option value="10">10분</option>
  </select>
  <span id="poll-countdown" class="paused">— 수동 —</span>
  <button class="btn" id="events-btn" onclick="toggleEventsFeed()" title="이벤트 피드 (닉변/클랜변경/밴 의심)">📡 이벤트</button>
  <span id="events-status">이벤트: 대기중</span>
</div>

<!-- GITHUB BAR -->
<div id="gh-bar">
  <span style="color:var(--text);opacity:0.5;">GITHUB</span>
  <input id="gh-owner" placeholder="유저명" style="width:100px;">
  <span style="opacity:0.3;">/</span>
  <input id="gh-repo" placeholder="레포명" style="width:110px;">
  <input id="gh-pat" type="password" placeholder="PAT (선택)">

<script>
'use strict';
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const API_BASE = 'https://api.ogclub.s4nt0s.eu';
const SEASON_ID = 10;

const LEAGUES = {
  1:{name:'Bronze 4',short:'B4',color:'#cd7f32'},
  2:{name:'Bronze 3',short:'B3',color:'#cd7f32'},
  3:{name:'Bronze 2',short:'B2',color:'#cd7f32'},
  4:{name:'Bronze 1',short:'B1',color:'#cd7f32'},
  5:{name:'Silver 4',short:'S4',color:'#c0c0c0'},
  6:{name:'Silver 3',short:'S3',color:'#c0c0c0'},
  7:{name:'Silver 2',short:'S2',color:'#c0c0c0'},
  8:{name:'Silver 1',short:'S1',color:'#c0c0c0'},
  9:{name:'Gold 4',short:'G4',color:'#ffd700'},
  10:{name:'Gold 3',short:'G3',color:'#ffd700'},
  11:{name:'Gold 2',short:'G2',color:'#ffd700'},
  12:{name:'Gold 1',short:'G1',color:'#ffd700'},
  13:{name:'Platinum 4',short:'P4',color:'#00e5a0'},
  14:{name:'Platinum 3',short:'P3',color:'#00e5a0'},
  15:{name:'Platinum 2',short:'P2',color:'#00e5a0'},
  16:{name:'Platinum 1',short:'P1',color:'#00e5a0'},
  17:{name:'Diamond 4',short:'D4',color:'#4aa8ff'},
  18:{name:'Diamond 3',short:'D3',color:'#4aa8ff'},
  19:{name:'Diamond 2',short:'D2',color:'#4aa8ff'},
  20:{name:'Diamond 1',short:'D1',color:'#4aa8ff'},
  21:{name:'Ruby',short:'RB',color:'#ff3b3b'},
};

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let watchlist = {};
let settings = { pollInterval:1, notifications:false };
let currentFilter = 'all';
let pollCountdownTimer = null;
let pollSecondsLeft = 0;
let editingTag = null;
let pendingAvatarBase64 = null;
let isRefreshing = false;
let lastEventId = 0;
let eventsPollTimer = null;
let currentHistoryTag = null;
let currentHistoryData = null;
let currentHistoryTab = 'score';

// ══════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem('tf_watchlist_v3');
    if (raw) watchlist = JSON.parse(raw);
    else {
      // migrate from v2
      const old = localStorage.getItem('tf_watchlist_v2');
      if (old) {
        watchlist = JSON.parse(old);
        // migrate field names
        for (const p of Object.values(watchlist)) {
          if (p.currentFame !== undefined && p.currentScore === undefined) {
            p.currentScore = p.currentFame;
          }
          if (p.fameHistory) {
            p.fameHistory = p.fameHistory.map(h => ({
              score: h.score ?? h.fame,
              rank: h.rank,
              t: h.t
            }));
          }
        }
        saveData();
      }
    }
    const rawS = localStorage.getItem('tf_settings');
    if (rawS) settings = { ...settings, ...JSON.parse(rawS) };
    const ghRaw = localStorage.getItem('tf_gh_settings');
    if (ghRaw) {
      const gh = JSON.parse(ghRaw);
      if (gh.owner) document.getElementById('gh-owner').value = gh.owner;
      if (gh.repo) document.getElementById('gh-repo').value = gh.repo;
      if (gh.pat) document.getElementById('gh-pat').value = gh.pat;
    }
  } catch(e) { watchlist = {}; }
}

function saveData() {
  localStorage.setItem('tf_watchlist_v3', JSON.stringify(watchlist));
}

function saveSettings() {
  localStorage.setItem('tf_settings', JSON.stringify(settings));
}

function saveGhSettings() {
  localStorage.setItem('tf_gh_settings', JSON.stringify({
    owner: document.getElementById('gh-owner').value.trim(),
    repo: document.getElementById('gh-repo').value.trim(),
    pat: document.getElementById('gh-pat').value.trim()
  }));
}

// ══════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════
let leaderboardCache = null;
let leaderboardCacheTime = 0;

async function fetchLeaderboard() {
  // Cache for 60 seconds to avoid hammering
  if (leaderboardCache && Date.now() - leaderboardCacheTime < 60000) {
    return leaderboardCache;
  }
  const res = await fetch(`${API_BASE}/leaderboard`, { signal: AbortSignal.timeout(15000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  leaderboardCache = json.data;
  leaderboardCacheTime = Date.now();
  return leaderboardCache;
}

async function fetchPlayerGraph(embarkId) {
  const res = await fetch(`${API_BASE}/graph`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ embarkId, seasonId: SEASON_ID, token: 'not-secret' }),
    signal: AbortSignal.timeout(15000)
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function fetchEvents() {
  const res = await fetch(`${API_BASE}/events/${SEASON_ID}`, { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

// ══════════════════════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════════════════════
async function refreshAll() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="checking-ring"></span> 조회중...';

  try {
    // Invalidate cache to get fresh data
    leaderboardCache = null;
    const allPlayers = await fetchLeaderboard();

    // Build fast lookup map
    const lookup = new Map();
    for (const p of allPlayers) {
      lookup.set(p.name.toLowerCase(), p);
    }

    const tags = Object.keys(watchlist);
    const activatedPlayers = [];

    for (const tag of tags) {
      const p = watchlist[tag];
      p.checking = false;
      p.lastChecked = Date.now();

      const data = lookup.get(tag.toLowerCase());

      if (data) {
        p.notFound = false;
        const prevScore = p.currentScore ?? null;
        const newScore = data.rankScore ?? 0;
        const newRank = data.rank ?? null;

        // Detect activity
        // lastActive = 이전 체크 시각 (실제 플레이는 그 사이에 일어난 것)
        // lastActiveDetected = 지금 (감지 시각)
        if (prevScore !== null && newScore !== prevScore) {
          p.lastActive = p.lastChecked || Date.now(); // 이전 lastChecked (아직 업데이트 전)
          p.lastActiveDetected = Date.now();
          activatedPlayers.push(tag);
        }

        // Update platform info
        p.steamName = data.steamName || null;
        p.psnName = data.psnName || null;
        p.xboxName = data.xboxName || null;
        p.clubTag = data.clubTag || null;
        p.clubUUId = data.clubUUId || null;
        p.leagueNumber = data.leagueNumber || null;
        p.rankChange = data.change ?? 0;
        p.currentScore = newScore;
        p.currentRank = newRank;

        // Score history (only on change)
        if (!p.fameHistory) p.fameHistory = [];
        const lastSnap = p.fameHistory.filter(h => h.score != null).slice(-1)[0];
        if (!lastSnap || lastSnap.score !== newScore) {
          p.fameHistory.push({ score: newScore, rank: newRank, t: Date.now() });
          if (p.fameHistory.length > 50) p.fameHistory.shift();
        }
      } else {
        p.notFound = true;
      }

      updateCard(tag);
    }

    saveData();
    updateHeaderStats();

    if (activatedPlayers.length > 0 && settings.notifications) {
      const msg = activatedPlayers.length === 1
        ? `${activatedPlayers[0]} 활동 감지됨!`
        : `${activatedPlayers.length}명 활동 감지`;
      sendNotification(msg);
      showBanner(msg);
    }

    document.getElementById('last-poll-time').textContent = '마지막 조회: ' + new Date().toLocaleTimeString('ko-KR');
    renderGrid();

    activatedPlayers.forEach(tag => {
      const el = document.querySelector(`.card[data-tag="${CSS.escape(tag)}"]`);
      if (el) { el.classList.add('just-active'); setTimeout(() => el.classList.remove('just-active'), 1000); }
    });
  } catch(e) {
    console.error('refreshAll error:', e);
    toast('조회 실패: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 16 16" style="width:13px;height:13px;fill:currentColor"><path d="M13.7 2.3A7.5 7.5 0 1 0 15 8h-1.5a6 6 0 1 1-1.1-3.5L10 6.5h4.5V2z"/></svg> 전체 조회';
  isRefreshing = false;
}

// ══════════════════════════════════════════════════════
//  EVENTS POLLING
// ══════════════════════════════════════════════════════
async function pollEvents() {
  try {
    const json = await fetchEvents();
    const events = json.data || [];
    document.getElementById('events-status').textContent = `이벤트: ${new Date().toLocaleTimeString('ko-KR')}`;

    // Find new events
    const newEvents = lastEventId > 0
      ? events.filter(e => e.id > lastEventId)
      : events;

    if (events.length > 0) {
      const maxId = Math.max(...events.map(e => typeof e.id === 'number' ? e.id : 0));
      if (maxId > lastEventId) lastEventId = maxId;
    }

    // Update feed UI
    renderEventsFeed(events.slice(0, 30));

    // Check if any tracked player has events
    for (const ev of newEvents) {
      const pid = ev.current_embark_id?.toLowerCase();
      if (!pid) continue;
      const tracked = Object.keys(watchlist).find(t => t.toLowerCase() === pid);
      if (!tracked) continue;

      const p = watchlist[tracked];
      if (ev.event_type === 'NAME_CHANGE') {
        const d = ev.details;
        if (d?.new_name) {
          if (!p.nicknameHistory) p.nicknameHistory = [];
          const already = p.nicknameHistory.some(h => h.name.toLowerCase() === d.new_name.toLowerCase());
          if (!already) {
            p.nicknameHistory.unshift({ name: d.new_name, detectedAt: ev.start_timestamp * 1000 });
            toast(`🔄 닉변 감지: ${tracked} → ${d.new_name}`, 'warn');
            if (settings.notifications) sendNotification(`닉변: ${tracked} → ${d.new_name}`);
          }
        }
      } else if (ev.event_type === 'SUSPECTED_BAN') {
        toast(`🚫 밴 의심: ${tracked}`, 'error');
        if (settings.notifications) sendNotification(`밴 의심: ${tracked}`);
      } else if (ev.event_type === 'RS_ADJUSTMENT') {
        const d = ev.details;
        if (d?.change) {
          toast(`⚡ 점수 이상: ${tracked} (${d.change > 0 ? '+' : ''}${d.change})`, 'warn');
        }
      }
      updateCard(tracked);
    }

    if (newEvents.some(ev => {
      const pid = ev.current_embark_id?.toLowerCase();
      return pid && Object.keys(watchlist).some(t => t.toLowerCase() === pid);
    })) {
      saveData();
    }
  } catch(e) {
    console.warn('events poll fail:', e.message);
  }
}

function renderEventsFeed(events) {
  const body = document.getElementById('events-feed-body');
  if (!events.length) {
    body.innerHTML = '<div style="padding:16px;font-family:var(--mono);font-size:11px;color:var(--text);opacity:0.4;">이벤트 없음</div>';
    return;
  }
  const trackedLower = new Set(Object.keys(watchlist).map(t => t.toLowerCase()));
  body.innerHTML = events.map(ev => {
    const pid = ev.current_embark_id || '';
    const isTracked = trackedLower.has(pid.toLowerCase());
    const time = new Date(ev.start_timestamp * 1000).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
    let typeLabel = '', desc = '';
    const d = ev.details;
    if (ev.event_type === 'NAME_CHANGE') {
      typeLabel = '닉변';
      desc = `${d?.old_name} → ${d?.new_name}`;
    } else if (ev.event_type === 'CLUB_CHANGE') {
      typeLabel = '클랜';
      desc = `[${d?.old_club||'없음'}] → [${d?.new_club||'없음'}]`;
    } else if (ev.event_type === 'SUSPECTED_BAN') {
      typeLabel = '밴의심';
      desc = `마지막 랭크: #${d?.last_known_rank}`;
    } else if (ev.event_type === 'RS_ADJUSTMENT') {
      typeLabel = '점수이상';
      desc = `${d?.change > 0 ? '+' : ''}${d?.change}`;
    } else {
      typeLabel = ev.event_type;
      desc = '';
    }
    return `<div class="feed-event-row${isTracked ? ' tracked' : ''}">
      <div class="feed-event-time">${time}${isTracked ? ' 🎯' : ''}</div>
      <div><span class="feed-event-player">${pid}</span> <span class="feed-event-desc">${typeLabel}: ${desc}</span></div>
    </div>`;
  }).join('');
}

function toggleEventsFeed() {
  document.getElementById('events-feed').classList.toggle('show');
}

// ══════════════════════════════════════════════════════
//  POLL TIMER
// ══════════════════════════════════════════════════════
function resetPoll() {
  clearInterval(pollCountdownTimer);
  const mins = parseInt(document.getElementById('interval-select').value);
  settings.pollInterval = mins;
  saveSettings();

  const cd = document.getElementById('poll-countdown');
  if (mins === 0) {
    cd.className = 'paused';
    cd.textContent = '— 수동 —';
    return;
  }

  pollSecondsLeft = mins * 60;
  cd.className = '';
  function tick() {
    pollSecondsLeft--;
    const m = Math.floor(pollSecondsLeft / 60);
    const s = String(pollSecondsLeft % 60).padStart(2,'0');
    cd.textContent = `${m}:${s}`;
    if (pollSecondsLeft <= 0) {
      pollSecondsLeft = mins * 60;
      refreshAll();
    }
  }
  tick();
  pollCountdownTimer = setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════════
//  CARD RENDER
// ══════════════════════════════════════════════════════
function getLeagueBadge(leagueNumber) {
  const lg = LEAGUES[leagueNumber];
  if (!lg) return '';
  return `<div class="league-badge" style="background:${lg.color}22;color:${lg.color};border:1px solid ${lg.color}44;">${lg.short}</div>`;
}

function getLeagueColor(leagueNumber) {
  return LEAGUES[leagueNumber]?.color || 'var(--text)';
}

function getActivityHTML(p) {
  const now = Date.now();
  const tod = now - 24*60*60*1000;
  if (!p.lastActive) {
    return `<span><span class="activity-dot"></span><span style="opacity:0.3;">활동 없음</span></span>`;
  }
  const elapsed = now - p.lastActive;
  const detElapsed = p.lastActiveDetected ? now - p.lastActiveDetected : elapsed;
  const mins = Math.floor(elapsed / 60000);
  const hrs = Math.floor(mins / 60);
  const days = Math.floor(hrs / 24);

  let timeStr;
  if (mins < 1) timeStr = '방금 전';
  else if (mins < 60) timeStr = `${mins}분 전`;
  else if (hrs < 24) timeStr = `${hrs}시간 ${mins%60}분 전`;
  else timeStr = `${days}일 전`;

  const gap = p.lastActiveDetected ? p.lastActiveDetected - p.lastActive : 0;
  const gapMins = Math.floor(gap / 60000);

  if (elapsed < 30*60*1000) {
    const dotClass = 'recent';
    const range = gapMins > 5 ? `~${Math.floor(detElapsed/60000)}분 전` : '';
    return `<span><span class="activity-dot ${dotClass}"></span><span class="active-time">▶ ${timeStr}${range ? ' ~ '+range : ''} 활동</span></span>`;
  } else if (p.lastActive > tod) {
    const range = gapMins > 5 ? ` ~ ${Math.floor(detElapsed/60000)}분 전` : '';
    return `<span><span class="activity-dot today"></span><span class="today-time">${timeStr}${range} 활동</span></span>`;
  } else {
    return `<span><span class="activity-dot"></span><span style="opacity:0.4;">${timeStr} 활동</span></span>`;
  }
}

function getSparklinePath(history) {
  const vals = history.filter(h => h.score != null).slice(-20).map(h => h.score);
  if (vals.length < 2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const w = 260, h = 28;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x},${y}`;
  });
  const color = vals[vals.length-1] >= vals[0] ? '#00e5a0' : '#ff3b3b';
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

function createCard(tag) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.tag = tag;
  document.getElementById('grid-container').appendChild(el);
  updateCard(tag);
}

function updateCard(tag) {
  const p = watchlist[tag];
  if (!p) return;
  let el = document.querySelector(`.card[data-tag="${CSS.escape(tag)}"]`);
  if (!el) return;

  const score = p.currentScore ?? 0;
  const rank = p.currentRank;
  const prevSnaps = (p.fameHistory || []).filter(h => h.score != null);
  const prevScore = prevSnaps.length > 1 ? prevSnaps[prevSnaps.length - 2].score : null;
  const scoreDelta = prevScore !== null ? score - prevScore : null;
  const rankChange = p.rankChange ?? 0;
  const lg = p.leagueNumber ? LEAGUES[p.leagueNumber] : null;

  el.className = `card status-${p.status || 'watching'}`;

  // Status badge
  const statusMap = {
    confirmed: '<span class="status-badge badge-confirmed">확정 핵</span>',
    suspicious: '<span class="status-badge badge-suspicious">의심</span>',
    watching: '<span class="status-badge badge-watching">감시중</span>',
  };
  const statusBadge = p.notFound
    ? '<span class="status-badge badge-notfound">미등재</span>'
    : (statusMap[p.status] || '');

  // Avatar
  const initials = tag.split('#')[0].slice(0,2).toUpperCase();
  const avatarContent = p.imageUrl
    ? `<img src="${p.imageUrl}" onerror="this.style.display='none'">`
    : `<span class="card-avatar-initials">${initials}</span>`;

  // Platform row
  const platforms = [];
  if (p.steamName) platforms.push(`<span class="platform-item"><span class="picon">🎮</span>${p.steamName}</span>`);
  if (p.psnName) platforms.push(`<span class="platform-item"><span class="picon">🎮</span>${p.psnName}</span>`);
  if (p.xboxName) platforms.push(`<span class="platform-item"><span class="picon">🎮</span>${p.xboxName}</span>`);
  const platformHTML = platforms.length ? `<div class="platform-row">${platforms.join('')}</div>` : '';

  // Score delta
  let deltaHTML = '';
  if (scoreDelta !== null) {
    const cls = scoreDelta > 0 ? 'pos' : scoreDelta < 0 ? 'neg' : 'neu';
    const sign = scoreDelta > 0 ? '+' : '';
    deltaHTML = `<div class="stat-delta ${cls}">${sign}${scoreDelta.toLocaleString()}</div>`;
  }

  // Rank change
  let rankChangeHTML = '';
  if (rankChange !== 0) {
    const cls = rankChange > 0 ? 'up' : 'down';
    const arrow = rankChange > 0 ? '▲' : '▼';
    rankChangeHTML = `<span class="rank-change ${cls}">${arrow}${Math.abs(rankChange)}</span>`;
  }

  // League color for score
  const lgColor = lg ? lg.color : 'var(--text-bright)';

  // Sparkline
  const spark = getSparklinePath(p.fameHistory || []);
  const chartHTML = spark ? `<div class="card-chart">${spark}</div>` : '';

  // Davg25 link
  const davgUrl = `https://www.davg25.com/app/the-finals-leaderboard-tracker/player-stats/?id=${encodeURIComponent(tag)}&season=s10`;
  const ogclubUrl = `https://ogclub.s4nt0s.eu/graph/10/${encodeURIComponent(tag)}`;

  el.innerHTML = `
    <div class="card-top">
      <div class="card-avatar">
        ${avatarContent}
        ${getLeagueBadge(p.leagueNumber)}
      </div>
      <div class="card-info">
        <div class="card-name-row">
          <span class="card-tag">${p.alias || tag}</span>
          ${p.alias ? `<span class="card-alias">${tag}</span>` : ''}
          ${p.clubTag ? `<span class="club-tag">[${p.clubTag}]</span>` : ''}
        </div>
        <div class="status-badges">
          ${statusBadge}
          ${p.checking ? '<span class="checking-ring"></span>' : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="event.stopPropagation();openHistory('${tag}')" title="기록 보기">📊</button>
        <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${tag}')" title="편집">✏️</button>
        <button class="icon-btn" onclick="event.stopPropagation();refreshSingle('${tag}')" title="개별 조회">🔄</button>
      </div>
    </div>
    ${platformHTML}
    <div class="card-stats">
      <div class="stat-item">
        <div class="stat-label">RANK</div>
        <div class="stat-val big">${rank ? '#' + rank.toLocaleString() : '—'}</div>
        ${rankChangeHTML}
      </div>
      <div class="stat-item">
        <div class="stat-label">SCORE</div>
        <div class="stat-val big" style="color:${lgColor}">${score ? score.toLocaleString() : '—'}</div>
        ${deltaHTML}
      </div>
    </div>
    ${chartHTML}
    <div class="card-activity">
      ${getActivityHTML(p)}
      <span class="card-notes-preview">${p.notes || ''}</span>
    </div>
    <div class="card-bottom">
      <div class="card-links">
        <a class="card-link" href="${davgUrl}" target="_blank" onclick="event.stopPropagation()">↗ davg25</a>
        <a class="card-link" href="${ogclubUrl}" target="_blank" onclick="event.stopPropagation()">↗ ogclub</a>
      </div>
      <span style="font-family:var(--mono);font-size:9px;color:var(--text);opacity:0.3;">${p.lastChecked ? new Date(p.lastChecked).toLocaleTimeString('ko-KR') : '—'}</span>
    </div>
  `;
}

// ══════════════════════════════════════════════════════
//  REFRESH SINGLE
// ══════════════════════════════════════════════════════
async function refreshSingle(tag) {
  const p = watchlist[tag];
  if (!p) return;
  p.checking = true;
  updateCard(tag);

  try {
    leaderboardCache = null;
    const all = await fetchLeaderboard();
    const data = all.find(e => e.name.toLowerCase() === tag.toLowerCase());
    p.checking = false;
    p.lastChecked = Date.now();

    if (data) {
      p.notFound = false;
      const prevScore = p.currentScore ?? null;
      const newScore = data.rankScore ?? 0;
      if (prevScore !== null && newScore !== prevScore) {
        p.lastActive = p.lastChecked;
        p.lastActiveDetected = Date.now();
        if (settings.notifications) sendNotification(`${tag} 활동 감지됨!`);
      }
      p.steamName = data.steamName || null;
      p.psnName = data.psnName || null;
      p.xboxName = data.xboxName || null;
      p.clubTag = data.clubTag || null;
      p.leagueNumber = data.leagueNumber || null;
      p.rankChange = data.change ?? 0;
      p.currentScore = newScore;
      p.currentRank = data.rank ?? null;
      if (!p.fameHistory) p.fameHistory = [];
      const last = p.fameHistory.filter(h => h.score != null).slice(-1)[0];
      if (!last || last.score !== newScore) {
        p.fameHistory.push({ score: newScore, rank: data.rank, t: Date.now() });
        if (p.fameHistory.length > 50) p.fameHistory.shift();
      }
    } else {
      p.notFound = true;
    }
  } catch(e) {
    p.checking = false;
    toast('조회 실패: ' + e.message, 'error');
  }

  saveData();
  updateCard(tag);
  updateHeaderStats();
}

// ══════════════════════════════════════════════════════
async function openHistory(tag) {
  currentHistoryTag = tag;
  currentHistoryData = null;
  currentHistoryTab = 'score';
  document.getElementById('history-title').textContent = `${tag} — 기록`;
  document.getElementById('history-overlay').style.display = 'flex';
  document.getElementById('history-body').innerHTML = '<div class="hist-loading">⌛ 서버에서 히스토리 로딩중...</div>';
  switchHistoryTab('score');

  try {
    const data = await fetchPlayerGraph(tag);
    currentHistoryData = data;
    renderHistoryTab(currentHistoryTab);
  } catch(e) {
    document.getElementById('history-body').innerHTML = `<div class="hist-loading">오류: ${e.message}</div>`;
  }
}

function switchHistoryTab(tab) {
  currentHistoryTab = tab;
  document.getElementById('htab-score').classList.toggle('active', tab === 'score');
  document.getElementById('htab-events').classList.toggle('active', tab === 'events');
  if (currentHistoryData !== undefined) renderHistoryTab(tab);
}

function renderHistoryTab(tab) {
  const body = document.getElementById('history-body');
  if (!currentHistoryData) {
    body.innerHTML = '<div class="hist-loading">데이터 없음</div>';
    return;
  }

  if (tab === 'score') {
    const points = (currentHistoryData.data || [])
      .filter(d => d.scoreChanged)
      .slice().reverse();
    if (!points.length) {
      body.innerHTML = '<div class="hist-loading">기록 없음</div>';
      return;
    }
    body.innerHTML = `
      <div class="hist-row header">
        <span>시각</span><span>순위</span><span>점수</span><span>변화</span>
      </div>
      ${points.map((d, i) => {
        const next = points[i + 1];
        const delta = next ? d.rankScore - next.rankScore : null;
        const deltaStr = delta !== null
          ? `<span class="hist-delta ${delta > 0 ? 'pos' : delta < 0 ? 'neg' : ''}">${delta > 0 ? '+' : ''}${delta.toLocaleString()}</span>`
          : '<span>—</span>';
        const dt = new Date(d.timestamp * 1000);
        const timeStr = dt.toLocaleDateString('ko-KR', {month:'numeric',day:'numeric'}) + ' ' + dt.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
        return `<div class="hist-row">
          <span class="hist-time">${timeStr}</span>
          <span class="hist-rank">#${d.rank.toLocaleString()}</span>
          <span class="hist-score">${d.rankScore.toLocaleString()}</span>
          ${deltaStr}
        </div>`;
      }).join('')}`;
  } else {
    const events = (currentHistoryData.events || []).slice().reverse();
    if (!events.length) {
      body.innerHTML = '<div class="hist-loading">이벤트 없음</div>';
      return;
    }
    body.innerHTML = events.map(ev => {
      const time = new Date(ev.start_timestamp * 1000).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const d = ev.details;
      let typeClass = 'event-name', typeLabel = '', desc = '';
      if (ev.event_type === 'NAME_CHANGE') {
        typeClass = 'event-name'; typeLabel = '닉변';
        desc = `${d?.old_name} → ${d?.new_name}`;
      } else if (ev.event_type === 'CLUB_CHANGE') {
        typeClass = 'event-club'; typeLabel = '클랜변경';
        desc = `[${d?.old_club||'없음'}] → [${d?.new_club||'없음'}]`;
      } else if (ev.event_type === 'SUSPECTED_BAN') {
        typeClass = 'event-ban'; typeLabel = '밴의심';
        desc = `마지막 랭크: #${d?.last_known_rank}`;
      } else if (ev.event_type === 'RS_ADJUSTMENT') {
        typeClass = 'event-rs'; typeLabel = '점수이상';
        desc = `${d?.change > 0 ? '+' : ''}${d?.change?.toLocaleString()}`;
      }
      return `<div class="event-row">
        <span class="event-type ${typeClass}">${typeLabel}</span>
        <span style="color:var(--text);flex:1;">${desc}</span>
        <span style="color:var(--text);opacity:0.4;font-size:10px;">${time}</span>
      </div>`;
    }).join('');
  }
}

// ══════════════════════════════════════════════════════
//  GRID RENDER
// ══════════════════════════════════════════════════════
function renderGrid() {
  const container = document.getElementById('grid-container');
  const search = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  const today = Date.now() - 24*60*60*1000;

  let tags = Object.keys(watchlist).filter(tag => {
    const p = watchlist[tag];
    if (currentFilter === 'confirmed' && p.status !== 'confirmed') return false;
    if (currentFilter === 'suspicious' && p.status !== 'suspicious') return false;
    if (currentFilter === 'watching' && p.status !== 'watching') return false;
    if (currentFilter === 'active' && !(p.lastActive && p.lastActive > today)) return false;
    if (search) {
      const haystack = [tag, p.alias, p.notes, p.steamName, p.psnName, p.xboxName, p.clubTag]
        .filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  tags.sort((a, b) => {
    const pa = watchlist[a], pb = watchlist[b];
    if (sort === 'lastActive') {
      const la = pa.lastActive || 0, lb = pb.lastActive || 0;
      return la !== lb ? lb - la : (pa.currentRank || 9999) - (pb.currentRank || 9999);
    }
    if (sort === 'rank') return (pa.currentRank || 99999) - (pb.currentRank || 99999);
    if (sort === 'score') return (pb.currentScore || 0) - (pa.currentScore || 0);
    if (sort === 'added') return (pa.addedAt || 0) - (pb.addedAt || 0);
    return 0;
  });

  // Remove cards not in list
  container.querySelectorAll('.card').forEach(el => {
    if (!tags.includes(el.dataset.tag)) el.remove();
  });

  // Reorder cards in DOM according to sorted tags
  tags.forEach(tag => {
    let el = container.querySelector(`.card[data-tag="${CSS.escape(tag)}"]`);
    if (!el) {
      el = document.createElement('div');
      el.className = 'card';
      el.dataset.tag = tag;
      container.appendChild(el);
    } else {
      container.appendChild(el); // move to end = re-sort
    }
    updateCard(tag);
  });

  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = tags.length ? 'none' : '';
  if (!document.getElementById('empty-state')) {
    if (!tags.length) {
      const e = document.createElement('div');
      e.id = 'empty-state';
      e.innerHTML = '<div class="empty-icon">🎯</div><div class="empty-text">추적할 플레이어를 추가하세요</div>';
      container.appendChild(e);
    }
  }
}

function updateHeaderStats() {
  const all = Object.values(watchlist);
  const today = Date.now() - 24*60*60*1000;
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-confirmed').textContent = all.filter(p => p.status === 'confirmed').length;
  document.getElementById('stat-suspicious').textContent = all.filter(p => p.status === 'suspicious').length;
  document.getElementById('stat-today').textContent = all.filter(p => p.lastActive && p.lastActive > today).length;
}

function openAddModal() {
  editingTag = null;
  pendingAvatarBase64 = null;
  document.getElementById('modal-title').textContent = '플레이어 추가';
  document.getElementById('input-tag').value = '';
  document.getElementById('input-tag').disabled = false;
  document.getElementById('input-alias').value = '';
  document.getElementById('input-notes').value = '';
  document.getElementById('input-img-url').value = '';
  document.getElementById('avatar-preview').innerHTML = '📷';
  document.getElementById('btn-delete').style.display = 'none';
  selectStatus('suspicious');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-tag').focus(), 100);
}

function openEditModal(tag) {
  editingTag = tag;
  pendingAvatarBase64 = null;
  const p = watchlist[tag];
  document.getElementById('modal-title').textContent = '플레이어 수정';
  document.getElementById('input-tag').value = tag;
  document.getElementById('input-tag').disabled = false;
  document.getElementById('input-alias').value = p.alias || '';
  document.getElementById('input-notes').value = p.notes || '';
  document.getElementById('input-img-url').value = (p.imageUrl && !p.imageUrl.startsWith('data:')) ? p.imageUrl : '';
  updateAvatarPreviewWith(p.imageUrl || '');
  document.getElementById('btn-delete').style.display = '';
  selectStatus(p.status || 'watching');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingTag = null;
  pendingAvatarBase64 = null;
}

function selectStatus(s) {
  document.querySelectorAll('.status-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.status === s);
  });
}

function getSelectedStatus() {
  return document.querySelector('.status-opt.selected')?.dataset.status || 'watching';
}

function updateAvatarPreview() {
  const url = document.getElementById('input-img-url').value.trim();
  pendingAvatarBase64 = null;
  updateAvatarPreviewWith(url);
}

function updateAvatarPreviewWith(src) {
  const preview = document.getElementById('avatar-preview');
  preview.innerHTML = src ? `<img src="${src}" onerror="this.parentElement.innerHTML='📷'">` : '📷';
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingAvatarBase64 = e.target.result;
    updateAvatarPreviewWith(pendingAvatarBase64);
    document.getElementById('input-img-url').value = '';
  };
  reader.readAsDataURL(file);
}

function savePlayer() {
  const tag = document.getElementById('input-tag').value.trim();
  if (!tag) { toast('플레이어 태그를 입력하세요', 'warn'); return; }
  const imageUrl = pendingAvatarBase64 || document.getElementById('input-img-url').value.trim() || null;

  if (editingTag) {
    const newTag = tag;
    const p = { ...watchlist[editingTag] };
    p.tag = newTag;
    p.alias = document.getElementById('input-alias').value.trim();
    p.status = getSelectedStatus();
    p.notes = document.getElementById('input-notes').value.trim();
    if (imageUrl !== null) p.imageUrl = imageUrl;
    if (newTag !== editingTag) {
      if (watchlist[newTag]) { toast('이미 존재하는 태그입니다', 'warn'); return; }
      if (!p.nicknameHistory) p.nicknameHistory = [];
      p.nicknameHistory.unshift({ name: editingTag, detectedAt: Date.now() });
      delete watchlist[editingTag];
    }
    watchlist[newTag] = p;
    toast('수정됨', 'success');
  } else {
    if (watchlist[tag]) { toast('이미 추가된 플레이어입니다', 'warn'); return; }
    watchlist[tag] = {
      tag, alias: document.getElementById('input-alias').value.trim(),
      status: getSelectedStatus(),
      notes: document.getElementById('input-notes').value.trim(),
      imageUrl: imageUrl || null,
      addedAt: Date.now(),
      lastChecked: null, lastActive: null, lastActiveDetected: null,
      currentScore: null, currentRank: null,
      steamName: null, psnName: null, xboxName: null,
      clubTag: null, leagueNumber: null, rankChange: 0,
      fameHistory: [], nicknameHistory: [], notFound: false, checking: false,
    };
    toast(`${tag} 추가됨`, 'success');
  }

  saveData();
  closeModal();
  renderGrid();
  updateHeaderStats();
}

function deletePlayer() {
  if (!editingTag || !confirm(`${editingTag}을 삭제하시겠습니까?`)) return;
  delete watchlist[editingTag];
  saveData();
  closeModal();
  renderGrid();
  updateHeaderStats();
  toast('삭제됨');
}

function toggleNotifications() {
  if (!settings.notifications) {
    Notification.requestPermission().then(p => {
      settings.notifications = (p === 'granted');
      updateNotifToggle();
      saveSettings();
      toast(settings.notifications ? '알림 활성화됨' : '알림 권한 거부됨', settings.notifications ? 'success' : 'warn');
    });
  } else {
    settings.notifications = false;
    updateNotifToggle();
    saveSettings();
    toast('알림 비활성화됨');
  }
}

function updateNotifToggle() {
  const btn = document.getElementById('notif-toggle');
  btn.className = 'toggle-btn' + (settings.notifications ? ' on' : '');
  btn.innerHTML = `<span class="toggle-dot"></span> ${settings.notifications ? '알림 ON' : '알림'}`;
}

function sendNotification(msg) {
  if (settings.notifications && Notification.permission === 'granted') {
    new Notification('THE FINALS WATCHLIST', { body: msg });
  }
}

function showBanner(msg) {
  const banner = document.getElementById('notif-banner');

// ══════════════════════════════════════════════════════
//  IO (EXPORT/IMPORT)
// ══════════════════════════════════════════════════════
function openIO(mode) {
  const overlay = document.getElementById('io-modal-overlay');
  const textarea = document.getElementById('io-textarea');
  const hint = document.getElementById('io-hint');
  const actionBtn = document.getElementById('io-action-btn');
  document.getElementById('io-modal-title').textContent = mode === 'export' ? '내보내기' : '불러오기';

  if (mode === 'export') {
    textarea.value = JSON.stringify(watchlist, null, 2);
    textarea.readOnly = true;
    hint.textContent = '아래 JSON을 복사하여 보관하세요.';
    actionBtn.textContent = '복사';
    actionBtn.onclick = () => { navigator.clipboard.writeText(textarea.value); toast('복사됨', 'success'); };
  } else {
    textarea.value = '';
    textarea.readOnly = false;
    hint.textContent = '이전에 내보낸 JSON을 붙여넣고 불러오기를 누르세요.';
    actionBtn.textContent = '불러오기';
    actionBtn.onclick = () => {
      try {
        const parsed = JSON.parse(textarea.value);
        const count = Object.keys(parsed).length;
        // Deduplicate on import
        for (const tag of Object.keys(parsed)) {
          const p = parsed[tag];
          if (Array.isArray(p.fameHistory)) {
            const deduped = [];
            let lastScore = null;
            for (const h of p.fameHistory) {
              const s = h.score ?? h.fame;
              if (s == null || s === lastScore) continue;
              deduped.push({ score: s, rank: h.rank, t: h.t });
              lastScore = s;
            }
            p.fameHistory = deduped;
          }
        }
        Object.assign(watchlist, parsed);
        saveData();
        renderGrid();
        updateHeaderStats();
        overlay.classList.remove('open');
        toast(`${count}명 불러옴`, 'success');
      } catch(e) { toast('올바른 JSON 형식이 아닙니다', 'error'); }
    };
  }
  overlay.classList.add('open');
}

// ══════════════════════════════════════════════════════
//  GITHUB
// ══════════════════════════════════════════════════════
function getGhConfig() {
  const owner = document.getElementById('gh-owner').value.trim();
  const repo = document.getElementById('gh-repo').value.trim();
  const pat = document.getElementById('gh-pat').value.trim();
  if (owner) saveGhSettings();
  return { owner, repo, pat };
}

async function githubPull() {
  const { owner, repo } = getGhConfig();
  if (!owner || !repo) { toast('유저명과 레포명을 입력하세요', 'warn'); return; }
  const btn = document.getElementById('gh-pull-btn');
  btn.textContent = '가져오는 중...'; btn.disabled = true;
  try {
    const url = `https://raw.githubusercontent.com/${owner}/${repo}/main/data/history.json?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const history = await res.json();
    let added = 0;
    for (const [tag, snaps] of Object.entries(history)) {
      if (!watchlist[tag]) continue;
      const p = watchlist[tag];
      if (!p.fameHistory) p.fameHistory = [];
      const existingScores = new Set(p.fameHistory.map(h => `${h.score}_${h.t}`));
      for (const snap of snaps) {
        if (!snap.fame && !snap.rankScore) continue;
        const score = snap.rankScore ?? snap.fame;
        const ts = snap.t ? new Date(snap.t).getTime() : null;
        if (!ts) continue;
        const key = `${score}_${ts}`;
        if (existingScores.has(key)) continue;
        const lastAdded = p.fameHistory.filter(h => h.score != null).slice(-1)[0];
        if (lastAdded && lastAdded.score === score) continue;
        p.fameHistory.push({ score, rank: snap.rank, t: ts });
        existingScores.add(key);
        added++;
      }
      p.fameHistory.sort((a, b) => a.t - b.t);
      if (p.fameHistory.length > 100) p.fameHistory = p.fameHistory.slice(-100);
    }
    saveData();
    renderGrid();
    toast(`히스토리 ${added}건 추가됨`, 'success');
    document.getElementById('gh-info').textContent = `저장: ${new Date().toLocaleTimeString('ko-KR')}`;
  } catch(e) {
    toast('가져오기 실패: ' + e.message, 'error');
  }
  btn.textContent = '↓ 히스토리 가져오기'; btn.disabled = false;
}

async function githubLoadPlayers() {
  const { owner, repo } = getGhConfig();
  if (!owner || !repo) { toast('유저명과 레포명을 입력하세요', 'warn'); return; }
  const btn = document.getElementById('gh-load-btn');
  btn.textContent = '불러오는 중...'; btn.disabled = true;
  try {
    const url = `https://raw.githubusercontent.com/${owner}/${repo}/main/players.json?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const tags = await res.json();
    let added = 0;
    for (const tag of tags) {
      if (!watchlist[tag]) {
        watchlist[tag] = {
          tag, alias:'', status:'watching', notes:'', imageUrl:null,
          addedAt:Date.now(), lastChecked:null, lastActive:null, lastActiveDetected:null,
          currentScore:null, currentRank:null,
          steamName:null, psnName:null, xboxName:null,
          clubTag:null, leagueNumber:null, rankChange:0,
          fameHistory:[], nicknameHistory:[], notFound:false, checking:false
        };
        added++;
      }
    }
    saveData();
    renderGrid();
    updateHeaderStats();
    toast(`${added}명 추가됨`, 'success');
  } catch(e) {
    toast('불러오기 실패: ' + e.message, 'error');
  }
  btn.textContent = '↓ players.json 불러오기'; btn.disabled = false;
}

async function githubPush() {
  const { owner, repo, pat } = getGhConfig();
  if (!owner || !repo || !pat) { toast('PAT이 필요합니다', 'warn'); return; }
  const btn = document.getElementById('gh-push-btn');
  btn.textContent = '동기화 중...'; btn.disabled = true;
  try {
    const tags = Object.keys(watchlist);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(tags, null, 2))));
    const shaRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/players.json`, {
      headers: { Authorization: `token ${pat}` }
    });
    const sha = shaRes.ok ? (await shaRes.json()).sha : undefined;
    const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/players.json`, {
      method: 'PUT',
      headers: { Authorization: `token ${pat}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `update players ${new Date().toISOString()}`, content, sha })
    });
    if (!putRes.ok) throw new Error('HTTP ' + putRes.status);
    toast('players.json 동기화 완료', 'success');
  } catch(e) {
    toast('동기화 실패: ' + e.message, 'error');
  }
  btn.textContent = '↑ 목록 동기화'; btn.disabled = false;
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function toast(msg, type='') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ══════════════════════════════════════════════════════
//  VISIBILITY & KEYBOARD
// ══════════════════════════════════════════════════════
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    refreshAll();
    if (settings.pollInterval > 0) pollSecondsLeft = settings.pollInterval * 60;
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    document.getElementById('history-overlay').style.display = 'none';
    document.getElementById('io-modal-overlay').classList.remove('open');
  }
  if (e.key === 'n' && !e.ctrlKey && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) openAddModal();
  if (e.key === 'r' && !e.ctrlKey && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) refreshAll();
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
function init() {
  loadData();
  updateNotifToggle();
  renderGrid();
  updateHeaderStats();

  // Set poll interval from settings
  const sel = document.getElementById('interval-select');
  if (settings.pollInterval !== undefined) sel.value = String(settings.pollInterval);
  resetPoll();

  // Start events polling (every 2 minutes)
  pollEvents();
  eventsPollTimer = setInterval(pollEvents, 2 * 60 * 1000);

  // Initial refresh
  if (Object.keys(watchlist).length > 0) {
    setTimeout(refreshAll, 500);
  }
}

init();
</script>
